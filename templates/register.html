<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/form-page.css">
    <link rel="icon" type="image/png" href="/static/imgs-&-svgs/hollowknight-2.jpg">
    <title>Sign Up</title>
</head>
<body>
<div class="bg-img">
    <form action="/register" method="post" class="container">
        <h1>Sign Up</h1>
        <label for="username"><b>Username</b></label>
        <input type="text" placeholder="Enter your Username" id="username" name="username" required autocomplete="off" autofocus>
        <label for="email"><b>Email</b></label>
        <input type="text" placeholder="Enter your Email" id="email" name="email" required autocomplete="off" autofocus>
        <label for="psw"><b>Password</b></label>
        <input type="password" placeholder="Enter your Password" id="myInput" name="psw" required autocomplete="off" autofocus>
        <input type="password" placeholder="Check your Password" id="myInput" name="psw-check" required autocomplete="off" autofocus><br><br>
        <p id="shift"><b>The Shift is on</b></p>
        <p id="caps"><b>The Caps Lock is on</b></p>
        <input id="checkbox-psw" type="checkbox" onclick="myFunction()"><b id="checkbox-text">Show Password</b>
        <button type="submit" class="btn">Register</button>
    </form>
</div>
<script>
    /* Start of Detect Caps or Shift*/
    var input = document.getElementById("myInput");
    var text = document.getElementById("shift");
    
    input.addEventListener("keydown", function(event){
        if(event.shiftKey){
            text.style.display = "block";
        }
    });
    
    input.addEventListener("keyup", function(event){
        if(!event.shiftKey){
            text.style.display = "none";
        }
    });
    
    var text_2 = document.getElementById("caps");
    input.addEventListener("keyup", function(event){
        if(event.getModifierState("CapsLock")){
            text_2.style.display = "block";
        } else {
            text_2.style.display = "none";
        }
    });
    /* End of Detect Caps or Shift */
    
    /* Start of Show Password */
    function myFunction() {
        var x = document.getElementById("myInput");
        if (x.type === "password"){
            x.type = "text";
        } else {
            x.type = "password";
        }
    }
    /* End of Show Password */
    </script>
    </body>
    </html>
